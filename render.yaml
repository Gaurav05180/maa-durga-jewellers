services:
  - type: web
    name: maa-durga-jewellers
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/jewellers-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false