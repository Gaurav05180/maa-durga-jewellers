# ── App ──────────────────────────────────────────
spring.application.name=MaaDurgaJewellers

# ── Database ─────────────────────────────────────
# On Render: uses DATABASE_URL from environment variable
# On your local machine: uses the localhost fallback
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/maadurga_jewellers}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Gaurav#05180@}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Neon SSL (required for Neon cloud database) ───
spring.datasource.hikari.data-source-properties.sslmode=require

# ── JPA / Hibernate ───────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Thymeleaf ─────────────────────────────────────
spring.thymeleaf.cache=false

# ── File upload ───────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Server port ───────────────────────────────────
server.port=${PORT:8080}

# ── Static resources ──────────────────────────────
spring.web.resources.static-locations=classpath:/static/,file:uploads/