# ── App ──────────────────────────────────────────
spring.application.name=MaaDurgaJewellers

# ── Database ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/maadurga_jewellers
spring.datasource.username=postgres
spring.datasource.password=Gaurav#05180@
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Thymeleaf ─────────────────────────────────────
spring.thymeleaf.cache=false

# ── File upload (for product images later) ────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Server port ───────────────────────────────────
server.port=8080


# Serve uploaded images from outside the JAR
spring.web.resources.static-locations=classpath:/static/,file:uploads/