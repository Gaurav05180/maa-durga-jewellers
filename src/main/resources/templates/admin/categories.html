<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Categories — Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">

<!-- Mobile overlay -->
<div class="admin-overlay" id="adminOverlay"></div>

<!-- Mobile top bar -->
<div class="admin-topbar">
    <span class="admin-topbar-title">✦ Admin Panel</span>
    <button class="admin-menu-toggle" id="adminMenuToggle">
        <span></span><span></span><span></span>
    </button>
</div>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="admin-logo">✦ Admin Panel</div>
        <nav class="admin-nav">
            <a th:href="@{/admin/dashboard}">Dashboard</a>
            <a th:href="@{/admin/products}">Products</a>
            <a th:href="@{/admin/categories}" class="active">Categories</a>
            <a th:href="@{/admin/inquiries}">Inquiries</a>
            <a th:href="@{/}">View Site</a>
            <a th:href="@{/admin/logout}" class="logout">Logout</a>
        </nav>
    </aside>
    <main class="admin-main">
        <div class="admin-header"><h1>Categories</h1></div>
        <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div class="admin-two-col">
            <!-- Add Form -->
            <div class="admin-card">
                <h2>Add New Category</h2>
                <form th:action="@{/admin/categories/save}"
                      th:object="${newCategory}" method="post">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" th:field="*{name}" placeholder="e.g. Necklaces" required/>
                    </div>
                    <div class="form-group">
                        <label>Slug (optional — auto-generated)</label>
                        <input type="text" th:field="*{slug}" placeholder="e.g. necklaces"/>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea th:field="*{description}" rows="3"
                                  placeholder="Short description..."></textarea>
                    </div>
                    <button type="submit" class="btn-admin-gold">Add Category</button>
                </form>
            </div>

            <!-- List -->
            <div class="admin-card">
                <h2>All Categories</h2>
                <table class="admin-table">
                    <thead>
                    <tr><th>Name</th><th>Slug</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.name}"></td>
                        <td th:text="${cat.slug}"></td>
                        <td>
                            <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
                               class="btn-delete"
                               onclick="return confirm('Delete this category?')">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const toggle   = document.getElementById('adminMenuToggle');
    const sidebar  = document.querySelector('.admin-sidebar');
    const overlay  = document.getElementById('adminOverlay');

    toggle.addEventListener('click', function () {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', function () {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    });
</script>

</body>
</html>
